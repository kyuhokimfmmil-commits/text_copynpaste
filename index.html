<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>텍스트 복사도구 - Smart Text Refiner</title>
<style>
    :root {
        --bg-color: #f5f5f7;
        --card-bg: #ffffff;
        --primary-color: #007aff;
        --primary-hover: #0056b3;
        --text-main: #1d1d1f;
        --text-muted: #86868b;
        --border-color: #d2d2d7;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
    }
    .container {
        width: 100%;
        max-width: 800px;
    }
    .header {
        text-align: center;
        margin-bottom: 40px;
    }
    .header h1 {
        font-size: 32px;
        font-weight: 600;
        margin: 0 0 8px 0;
        letter-spacing: -0.5px;
    }
    .header p {
        font-size: 17px;
        color: var(--text-muted);
        margin: 0;
        font-weight: 400;
    }
    .card {
        background-color: var(--card-bg);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        margin-bottom: 20px;
    }
    .input-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
    }
    .input-group label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
    }
    textarea {
        width: 100%;
        height: 180px;
        padding: 16px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 15px;
        line-height: 1.6;
        font-family: inherit;
        resize: vertical;
        box-sizing: border-box;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }
    .button-group {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }
    button {
        padding: 14px 24px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .btn-primary {
        background-color: var(--primary-color);
        color: white;
    }
    .btn-primary:hover {
        background-color: var(--primary-hover);
    }
    .btn-secondary {
        background-color: var(--bg-color);
        color: var(--text-main);
    }
    .btn-secondary:hover {
        background-color: #e8e8ed;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>텍스트 복사도구</h1>
        <p>Smart Text Refiner</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label for="inputText">PDF 원본 텍스트</label>
            <textarea id="inputText" placeholder="여기에 PDF에서 복사한 텍스트를 붙여넣으세요..."></textarea>
        </div>

        <div class="input-group">
            <label for="outputText">변환된 텍스트</label>
            <textarea id="outputText" readonly placeholder="변환된 텍스트가 여기에 표시됩니다."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-secondary" onclick="clearText()">지우기</button>
            <button class="btn-primary" onclick="processAndCopy()">변환 후 자동 복사</button>
        </div>
    </div>
</div>

<script>
    function processAndCopy() {
        const input = document.getElementById('inputText').value;
        if (!input.trim()) return;

        const paragraphs = input.split(/\n\s*\n/);
        const result = paragraphs.map(p => p.replace(/\s+/g, ' ').trim()).join('\n\n');

        const outputField = document.getElementById('outputText');
        outputField.value = result;

        navigator.clipboard.writeText(result).then(() => {
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerText;
            btn.innerText = '복사 완료!';
            setTimeout(() => {
                btn.innerText = originalText;
            }, 2000);
        }).catch(err => {
            alert('클립보드 복사에 실패했습니다.');
        });
    }

    function clearText() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
        document.getElementById('inputText').focus();
    }
</script>
</body>
</html>
